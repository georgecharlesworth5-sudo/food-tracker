<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Food Tracker" />
  <title>Food & Drink Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; max-width: 480px; margin: 0 auto; padding-bottom: 80px; }
    input, select, button { font-family: inherit; }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.25s ease; }

    .header { background: #1e293b; padding: 20px 20px 0; border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 100; }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .date-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #64748b; margin-bottom: 2px; }
    .page-title { font-size: 22px; font-weight: 700; color: #f8fafc; }
    .goal-btn { background: transparent; border: none; color: #64748b; cursor: pointer; font-size: 12px; text-decoration: underline; }
    .goal-edit { display: flex; gap: 6px; align-items: center; }
    .goal-input { width: 70px; padding: 4px 6px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: #f8fafc; font-size: 14px; }
    .goal-set-btn { background: #3b82f6; color: #fff; border: none; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 13px; }

    .stats-row { display: flex; align-items: center; gap: 20px; padding-bottom: 20px; }
    .stats-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-card { background: #0f172a; border-radius: 10px; padding: 10px 12px; }
    .stat-label { font-size: 11px; color: #64748b; margin-bottom: 2px; }
    .stat-value { font-size: 18px; font-weight: 700; }
    .stat-unit { font-size: 10px; color: #475569; }

    .tabs { display: flex; }
    .tab-btn { flex: 1; padding: 10px 0; background: transparent; border: none; border-bottom: 2px solid transparent; color: #64748b; cursor: pointer; font-weight: 600; font-size: 13px; }
    .tab-btn.active { border-bottom-color: #3b82f6; color: #3b82f6; }

    .content { padding: 16px; }
    .card { background: #1e293b; border-radius: 14px; padding: 16px; margin-bottom: 16px; }
    .card-label { font-size: 12px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }

    .input-wrap { position: relative; margin-bottom: 10px; }
    .text-input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #f8fafc; font-size: 14px; outline: none; }
    .text-input:focus { border-color: #3b82f6; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .num-input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #f8fafc; font-size: 14px; outline: none; }
    .num-input:focus { border-color: #3b82f6; }
    select.cat-select { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #f8fafc; font-size: 13px; outline: none; -webkit-appearance: none; }
    .add-btn { width: 100%; padding: 11px; border-radius: 8px; border: none; font-weight: 600; font-size: 14px; cursor: pointer; }
    .add-btn.enabled { background: #3b82f6; color: #fff; }
    .add-btn.disabled { background: #1e3a5f; color: #475569; cursor: default; }

    .autocomplete { position: absolute; top: 110%; left: 0; right: 0; background: #1e293b; border: 1px solid #334155; border-radius: 8px; z-index: 50; overflow: hidden; }
    .autocomplete-item { padding: 10px 14px; cursor: pointer; display: flex; justify-content: space-between; border-bottom: 1px solid #0f172a; font-size: 13px; }
    .autocomplete-item:hover { background: #334155; }
    .ac-cal { color: #94a3b8; }

    .quick-section { margin-bottom: 16px; }
    .quick-label { font-size: 11px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .quick-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip { padding: 6px 12px; border-radius: 20px; border: 1px solid #334155; background: #1e293b; color: #94a3b8; cursor: pointer; font-size: 12px; white-space: nowrap; }
    .chip:active { background: #334155; }
    .chip-cal { color: #64748b; }

    .empty-state { text-align: center; padding: 40px 20px; color: #475569; font-size: 14px; line-height: 1.6; }
    .cat-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .cat-name { font-size: 12px; color: #94a3b8; font-weight: 600; }
    .cat-total { font-size: 12px; color: #64748b; }
    .entry-card { background: #1e293b; border-radius: 10px; padding: 10px 14px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
    .entry-name { font-size: 14px; font-weight: 500; color: #f1f5f9; }
    .entry-time { font-size: 11px; color: #475569; margin-top: 1px; }
    .entry-right { display: flex; align-items: center; gap: 10px; }
    .entry-cal { font-size: 15px; font-weight: 700; color: #94a3b8; }
    .remove-btn { background: transparent; border: none; color: #475569; cursor: pointer; font-size: 16px; padding: 0 4px; line-height: 1; }

    .history-card { background: #1e293b; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
    .history-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .history-label { font-size: 13px; font-weight: 600; color: #f1f5f9; }
    .history-total { font-size: 13px; font-weight: 700; }
    .progress-bar-bg { height: 4px; background: #0f172a; border-radius: 2px; overflow: hidden; }
    .progress-bar { height: 100%; border-radius: 2px; transition: width 0.5s ease; }

    /* Water */
    .water-card { background: #1e293b; border-radius: 14px; padding: 16px; margin-bottom: 16px; }
    .water-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .water-title { font-size: 12px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .water-amount { font-size: 13px; font-weight: 700; color: #38bdf8; }
    .water-bar-bg { height: 8px; background: #0f172a; border-radius: 4px; overflow: hidden; margin-bottom: 12px; }
    .water-bar { height: 100%; border-radius: 4px; background: #38bdf8; transition: width 0.4s ease; }
    .water-chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .water-chip { flex: 1; min-width: 60px; padding: 8px 4px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: #38bdf8; cursor: pointer; font-size: 13px; font-weight: 600; text-align: center; }
    .water-chip:active { background: #0c4a6e; }
    .water-undo { background: transparent; border: none; color: #475569; cursor: pointer; font-size: 12px; text-decoration: underline; margin-top: 8px; display: block; }
    .water-complete { color: #22c55e; font-size: 12px; margin-top: 4px; text-align: center; display: block; }

    /* Fasting timer */
    .fast-card { background: #1e293b; border-radius: 14px; padding: 16px; margin-bottom: 16px; }
    .fast-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .fast-title { font-size: 12px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .fast-status { font-size: 12px; font-weight: 600; }
    .fast-countdown { text-align: center; margin-bottom: 12px; }
    .fast-time { font-size: 42px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
    .fast-sublabel { font-size: 11px; color: #64748b; margin-top: 4px; }
    .fast-bar-bg { height: 8px; background: #0f172a; border-radius: 4px; overflow: hidden; margin-bottom: 12px; }
    .fast-bar { height: 100%; border-radius: 4px; transition: width 1s ease; }
    .fast-btn { width: 100%; padding: 11px; border-radius: 8px; border: none; font-weight: 600; font-size: 14px; cursor: pointer; }
    .fast-btn-start { background: #f59e0b; color: #000; }
    .fast-btn-stop { background: #334155; color: #94a3b8; }
    .fast-started { font-size: 11px; color: #64748b; text-align: center; margin-top: 8px; }

    /* Weight */
    .weight-hero { text-align: center; padding: 24px 0 20px; }
    .weight-current { font-size: 56px; font-weight: 800; color: #f8fafc; letter-spacing: -2px; line-height: 1; }
    .weight-current span { font-size: 22px; color: #64748b; font-weight: 400; }
    .weight-delta { font-size: 14px; font-weight: 600; margin-top: 6px; }
    .weight-target { font-size: 12px; color: #64748b; margin-top: 4px; }
    .weight-controls { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 20px; }
    .weight-btn { width: 52px; height: 52px; border-radius: 50%; border: none; font-size: 24px; font-weight: 300; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .weight-btn-minus { background: #1e293b; color: #94a3b8; }
    .weight-btn-minus:active { background: #334155; }
    .weight-btn-plus { background: #1e293b; color: #94a3b8; }
    .weight-btn-plus:active { background: #334155; }
    .weight-display { font-size: 36px; font-weight: 700; color: #f8fafc; min-width: 110px; text-align: center; letter-spacing: -1px; }
    .weight-display span { font-size: 16px; color: #64748b; font-weight: 400; }
    .weight-log-btn { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #3b82f6; color: #fff; font-weight: 700; font-size: 15px; cursor: pointer; margin-bottom: 20px; }
    .weight-log-btn:active { background: #2563eb; }
    .weight-history-label { font-size: 11px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .weight-entry { background: #1e293b; border-radius: 10px; padding: 10px 14px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
    .weight-entry-date { font-size: 13px; color: #94a3b8; }
    .weight-entry-right { display: flex; align-items: center; gap: 10px; }
    .weight-entry-kg { font-size: 16px; font-weight: 700; color: #f1f5f9; }
    .weight-entry-delta { font-size: 12px; font-weight: 600; }
    .weight-progress-section { background: #1e293b; border-radius: 14px; padding: 16px; margin-bottom: 16px; }
    .weight-progress-row { display: flex; justify-content: space-between; margin-bottom: 10px; }
    .weight-progress-stat { text-align: center; }
    .weight-progress-val { font-size: 18px; font-weight: 700; }
    .weight-progress-lbl { font-size: 10px; color: #64748b; margin-top: 2px; }
    .wt-bar-bg { height: 10px; background: #0f172a; border-radius: 5px; overflow: hidden; }
    .wt-bar { height: 100%; border-radius: 5px; background: #a78bfa; transition: width 0.5s ease; }

    /* Chart */
    .weight-chart { width: 100%; height: 120px; margin-bottom: 16px; }

    /* Meals */
    .sync-line { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .sync-text { font-size: 11px; color: #64748b; }
    .sync-text.ok { color: #22c55e; }
    .sync-text.err { color: #ef4444; }
    .refresh-link { background: transparent; border: none; color: #64748b; cursor: pointer; font-size: 11px; text-decoration: underline; }
    .meal-row { background: #1e293b; border-radius: 10px; padding: 10px 12px; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
    .meal-dial { width: 40px; height: 26px; border-radius: 13px; flex: 0 0 auto; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #0f172a; }
    .meal-info { flex: 1; min-width: 0; }
    .meal-name { font-size: 14px; font-weight: 500; color: #f1f5f9; }
    .meal-meta { font-size: 11px; color: #64748b; margin-top: 1px; }
    .meal-had-btn { background: #334155; color: #a78bfa; border: none; padding: 7px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; cursor: pointer; flex: 0 0 auto; }
    .meal-had-btn:disabled { opacity: 0.5; }
    .seed-card { background: #1e293b; border: 1px dashed #334155; border-radius: 12px; padding: 14px; margin-bottom: 16px; }
    .seed-names { font-size: 12px; color: #64748b; line-height: 1.6; margin-bottom: 10px; }
  </style>
</head>
<body>
<div id="app"></div>
<script>
const WORKER_URL = "https://meal-planner-worker.georgecharlesworth5.workers.dev";
const CORE_SEED = [
  "Bangers and Mash","Bolognese","Lasagna","Sausage Casserole","French Onion Pasta",
  "Korean Turkey Rice","Roast Chicken","Chicken Pine Nut Pasta","Veggie Curry",
  "Fajitas","Jacket Potatoes","Cream Corn Pasta","Smoked Sausage Pasta","Shakshuka"
];
const CATEGORIES = ["🍳 Breakfast", "🥗 Lunch", "🍽️ Dinner", "☕ Snack / Drink"];
const QUICK_ADD = [
  { name: "Black coffee", cal: 2, category: "☕ Snack / Drink" },
  { name: "Flat white", cal: 120, category: "☕ Snack / Drink" },
  { name: "Pint of lager", cal: 182, category: "☕ Snack / Drink" },
  { name: "Glass of red wine", cal: 125, category: "☕ Snack / Drink" },
  { name: "Banana", cal: 89, category: "☕ Snack / Drink" },
  { name: "Chicken breast (150g)", cal: 165, category: "🍽️ Dinner" },
  { name: "White rice (100g cooked)", cal: 130, category: "🍽️ Dinner" },
  { name: "Porridge (oats + milk)", cal: 290, category: "🍳 Breakfast" },
];
const DEFAULT_GOAL = 2100;
const WATER_GOAL_ML = 2500;
const START_WEIGHT = 105;
const TARGET_WEIGHT = 100;

let state = {
  entries: {}, goal: DEFAULT_GOAL, activeTab: "meals",
  formName: "", formCal: "", formCat: CATEGORIES[0],
  editGoal: false, goalInput: DEFAULT_GOAL, searchText: "",
  water: {}, weightLog: [], weightInput: 105.0,
  fastStart: null,
  meals: [], mealsSync: "Connecting…", mealsSyncCls: "", newMealName: "",
};

function loadState() {
  try { state.entries = JSON.parse(localStorage.getItem("cal_entries") || "{}"); } catch {}
  try { state.water = JSON.parse(localStorage.getItem("cal_water") || "{}"); } catch {}
  try { state.weightLog = JSON.parse(localStorage.getItem("cal_weight") || "[]"); } catch {}
  state.fastStart = localStorage.getItem("cal_fast_start") ? parseInt(localStorage.getItem("cal_fast_start")) : null;
  const g = parseInt(localStorage.getItem("cal_goal"));
  if (!isNaN(g) && g > 0) { state.goal = g; state.goalInput = g; }
  // Restart fast tick if active
  if (state.fastStart) startFastTick();
  // Set weight input to last logged weight or start weight
  if (state.weightLog.length > 0) {
    state.weightInput = state.weightLog[state.weightLog.length - 1].kg;
  }
}

function saveEntries() { localStorage.setItem("cal_entries", JSON.stringify(state.entries)); }
function saveWater() { localStorage.setItem("cal_water", JSON.stringify(state.water)); }
function saveWeight() { localStorage.setItem("cal_weight", JSON.stringify(state.weightLog)); }

function getTodayKey() { return new Date().toISOString().slice(0, 10); }
function formatTime(ts) { return new Date(ts).toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" }); }
function formatDate(key) {
  const d = new Date(key + "T12:00:00");
  return d.toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short" });
}

function todayEntries() { return state.entries[getTodayKey()] || []; }
function todayTotal() { return todayEntries().reduce((s, e) => s + e.cal, 0); }
function todayWater() { return state.water[getTodayKey()] || 0; }
function latestWeight() { return state.weightLog.length > 0 ? state.weightLog[state.weightLog.length - 1].kg : null; }

function mealDaysSince(dateStr) {
  if (!dateStr) return null;
  const diff = (Date.now() - new Date(dateStr + "T00:00:00").getTime()) / 86400000;
  return Math.max(0, Math.floor(diff));
}
function mealDialColor(days) {
  if (days === null) return "#f59e0b";
  const t = Math.min(days, 21) / 21;
  const c1 = [71, 85, 105], c2 = [245, 158, 11]; // slate -> amber
  const r = Math.round(c1[0] + (c2[0]-c1[0]) * t);
  const g = Math.round(c1[1] + (c2[1]-c1[1]) * t);
  const b = Math.round(c1[2] + (c2[2]-c1[2]) * t);
  return `rgb(${r},${g},${b})`;
}
function mealDialLabel(days) {
  if (days === null) return "new";
  if (days === 0) return "today";
  return days + "d";
}

async function loadMeals() {
  state.mealsSync = "Syncing…"; state.mealsSyncCls = "";
  if (state.activeTab === "meals") render();
  try {
    const res = await fetch(`${WORKER_URL}/meals`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    state.meals = data.meals || [];
    state.mealsSync = "Synced with Sheet"; state.mealsSyncCls = "ok";
  } catch (err) {
    console.error("loadMeals failed", err);
    state.mealsSync = "Could not reach the Sheet"; state.mealsSyncCls = "err";
  }
  if (state.activeTab === "meals") render();
}

async function logMealToSheet(name, type, btnEl) {
  if (btnEl) { btnEl.disabled = true; btnEl.textContent = "Saving…"; }
  try {
    const res = await fetch(`${WORKER_URL}/log`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, type })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    await loadMeals();
  } catch (err) {
    console.error("logMeal failed", err);
    alert("Could not save to the Sheet: " + err.message);
    if (btnEl) { btnEl.disabled = false; btnEl.textContent = "Had it today"; }
  }
}

async function seedCoreMeals() {
  const btn = document.getElementById("seedBtn");
  if (btn) { btn.disabled = true; btn.textContent = "Adding…"; }
  try {
    for (const name of CORE_SEED) {
      await fetch(`${WORKER_URL}/log`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, type: "Core rotation" })
      });
    }
  } catch (err) {
    console.error("seed failed", err);
  }
  await loadMeals();
}

function addOtherMeal() {
  const input = document.getElementById("newMealInput");
  const name = (input?.value || "").trim();
  if (!name) return;
  input.value = "";
  logMealToSheet(name, "Inspiration");
}

function adjustWeight(delta) {
  state.weightInput = Math.round((state.weightInput + delta) * 10) / 10;
  document.getElementById("weightDisplay").innerHTML = `${state.weightInput.toFixed(1)}<span> kg</span>`;
}

function logWeight() {
  const kg = state.weightInput;
  const key = getTodayKey();
  // Replace today's entry if already exists
  state.weightLog = state.weightLog.filter(e => e.date !== key);
  state.weightLog.push({ date: key, kg });
  state.weightLog.sort((a, b) => a.date.localeCompare(b.date));
  saveWeight();
  render();
}

function deleteWeight(date) {
  state.weightLog = state.weightLog.filter(e => e.date !== date);
  saveWeight();
  render();
}

function startFast() {
  state.fastStart = Date.now();
  localStorage.setItem("cal_fast_start", state.fastStart);
  startFastTick();
  renderFast();
}

function stopFast() {
  state.fastStart = null;
  localStorage.removeItem("cal_fast_start");
  if (window._fastTimer) { clearInterval(window._fastTimer); window._fastTimer = null; }
  renderFast();
}

function startFastTick() {
  if (window._fastTimer) clearInterval(window._fastTimer);
  window._fastTimer = setInterval(renderFast, 1000);
}

function renderFast() {
  const el = document.getElementById("fastCard");
  if (!el) { if (window._fastTimer) clearInterval(window._fastTimer); return; }
  const FAST_MS = 15 * 60 * 60 * 1000;
  if (!state.fastStart) {
    el.innerHTML = `
      <div class="fast-top">
        <span class="fast-title">⏱ Fasting Timer</span>
        <span class="fast-status" style="color:#64748b">Not started</span>
      </div>
      <div class="fast-countdown">
        <div class="fast-time" style="color:#475569">15:00</div>
        <div class="fast-sublabel">15 hour countdown</div>
      </div>
      <div class="fast-bar-bg"><div class="fast-bar" style="width:0%;background:#f59e0b"></div></div>
      <button class="fast-btn fast-btn-start" onclick="startFast()">Start fast</button>
    `;
    return;
  }
  const elapsed = Date.now() - state.fastStart;
  const remaining = Math.max(FAST_MS - elapsed, 0);
  const pct = Math.min((elapsed / FAST_MS) * 100, 100);
  const done = remaining === 0;
  const h = Math.floor(remaining / 3600000);
  const m = Math.floor((remaining % 3600000) / 60000);
  const s = Math.floor((remaining % 60000) / 1000);
  const timeStr = done ? "Complete!" : `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const color = done ? "#22c55e" : pct > 80 ? "#a78bfa" : "#f59e0b";
  const startedAt = new Date(state.fastStart).toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });
  el.innerHTML = `
    <div class="fast-top">
      <span class="fast-title">⏱ Fasting Timer</span>
      <span class="fast-status" style="color:${color}">${done ? "✓ Goal reached!" : "Active"}</span>
    </div>
    <div class="fast-countdown">
      <div class="fast-time" style="color:${color}">${timeStr}</div>
      <div class="fast-sublabel">${done ? "15 hours complete 🎉" : "remaining of 15 hours"}</div>
    </div>
    <div class="fast-bar-bg"><div class="fast-bar" style="width:${pct}%;background:${color}"></div></div>
    <button class="fast-btn fast-btn-stop" onclick="stopFast()">End fast</button>
    <div class="fast-started">Started at ${startedAt}</div>
  `;
}

function addWater(ml) {
  const key = getTodayKey();
  state.water[key] = (state.water[key] || 0) + ml;
  saveWater();
  renderWater();
}

function undoWater() {
  const key = getTodayKey();
  state.water[key] = Math.max(0, (state.water[key] || 0) - 550);
  saveWater();
  renderWater();
}

function renderWater() {
  const w = todayWater();
  const pct = Math.min((w / WATER_GOAL_ML) * 100, 100);
  const litres = (w / 1000).toFixed(2).replace(/\.?0+$/, '') || '0';
  const goalL = (WATER_GOAL_ML / 1000).toFixed(1);
  const amountEl = document.getElementById("waterAmount");
  const barEl = document.getElementById("waterBar");
  const msgEl = document.getElementById("waterMsg");
  if (amountEl) amountEl.textContent = `${litres}L / ${goalL}L`;
  if (barEl) barEl.style.width = `${pct}%`;
  if (msgEl) {
    msgEl.innerHTML = w >= WATER_GOAL_ML
      ? '<span class="water-complete">✓ Goal reached!</span>'
      : '<button class="water-undo" onclick="undoWater()">↩ Undo last</button>';
  }
}

function addEntry(name, cal, category) {
  if (!name || !cal || isNaN(cal)) return;
  const key = getTodayKey();
  const entry = { id: Date.now() + Math.random(), name, cal: Math.round(cal), category, ts: Date.now() };
  if (!state.entries[key]) state.entries[key] = [];
  state.entries[key].push(entry);
  saveEntries();
  state.formName = ""; state.formCal = ""; state.searchText = "";
  render();
}

function removeEntry(id) {
  const key = getTodayKey();
  state.entries[key] = (state.entries[key] || []).filter(e => e.id !== id);
  saveEntries();
  render();
}

function buildWeightChart(log) {
  if (log.length < 2) return '';
  const weights = log.map(e => e.kg);
  const minW = Math.min(...weights) - 0.5;
  const maxW = Math.max(...weights) + 0.5;
  const W = 400, H = 100, pad = 10;
  const xScale = i => pad + (i / (log.length - 1)) * (W - pad * 2);
  const yScale = v => H - pad - ((v - minW) / (maxW - minW)) * (H - pad * 2);
  const pts = log.map((e, i) => `${xScale(i)},${yScale(e.kg)}`).join(' ');
  const areaBottom = H - pad;
  const areaPts = `${xScale(0)},${areaBottom} ${pts} ${xScale(log.length-1)},${areaBottom}`;

  // Target line
  const targetY = yScale(TARGET_WEIGHT);
  const targetLine = TARGET_WEIGHT >= minW && TARGET_WEIGHT <= maxW
    ? `<line x1="${pad}" y1="${targetY}" x2="${W - pad}" y2="${targetY}" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>`
    : '';

  return `
    <svg class="weight-chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="wGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${targetLine}
      <polygon points="${areaPts}" fill="url(#wGrad)"/>
      <polyline points="${pts}" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      ${log.map((e, i) => `<circle cx="${xScale(i)}" cy="${yScale(e.kg)}" r="3" fill="#a78bfa"/>`).join('')}
    </svg>
  `;
}

function render() {
  const app = document.getElementById("app");
  const entries = todayEntries();
  const total = todayTotal();
  const remaining = state.goal - total;
  const pct = Math.min((total / state.goal) * 100, 100);
  const ringColor = pct < 80 ? "#22c55e" : pct < 100 ? "#f59e0b" : "#ef4444";
  const remColor = remaining >= 0 ? "#22c55e" : "#ef4444";
  const circumference = 2 * Math.PI * 33;
  const offset = circumference * (1 - pct / 100);

  const grouped = {};
  CATEGORIES.forEach(c => { grouped[c] = entries.filter(e => e.category === c); });

  const w = todayWater();
  const wPct = Math.min((w / WATER_GOAL_ML) * 100, 100);
  const wL = (w / 1000).toFixed(2).replace(/\.?0+$/, '') || '0';
  const goalL = (WATER_GOAL_ML / 1000).toFixed(1);

  // Weight tab data
  const wLog = state.weightLog;
  const currentKg = latestWeight();
  const totalLost = currentKg !== null ? Math.round((START_WEIGHT - currentKg) * 10) / 10 : 0;
  const toGo = currentKg !== null ? Math.round((currentKg - TARGET_WEIGHT) * 10) / 10 : START_WEIGHT - TARGET_WEIGHT;
  const progressPct = Math.min(Math.max((START_WEIGHT - (currentKg || START_WEIGHT)) / (START_WEIGHT - TARGET_WEIGHT) * 100, 0), 100);

  app.innerHTML = `
    <div class="header">
      <div class="header-top">
        <div>
          <div class="date-label">${new Date().toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long" })}</div>
          <div class="page-title">Food & Drink</div>
        </div>
        <div>
          ${state.editGoal ? `
            <div class="goal-edit">
              <input class="goal-input" type="number" id="goalInput" value="${state.goalInput}" />
              <button class="goal-set-btn" onclick="setGoal()">Set</button>
            </div>
          ` : `
            <button class="goal-btn" onclick="openGoalEdit()">Goal: ${state.goal.toLocaleString()} kcal</button>
          `}
        </div>
      </div>

      <div class="stats-row">
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle cx="40" cy="40" r="33" fill="none" stroke="#1e3a5f" stroke-width="8"/>
          <circle cx="40" cy="40" r="33" fill="none" stroke="${ringColor}" stroke-width="8"
            stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"
            stroke-linecap="round" transform="rotate(-90 40 40)" style="transition:stroke-dashoffset 0.5s ease"/>
          <text x="40" y="38" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="700">${Math.round(pct)}%</text>
          <text x="40" y="52" text-anchor="middle" fill="#94a3b8" font-size="9">of goal</text>
        </svg>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Consumed</div>
            <div class="stat-value" style="color:#f8fafc">${total.toLocaleString()}</div>
            <div class="stat-unit">kcal</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">${remaining >= 0 ? "Remaining" : "Over by"}</div>
            <div class="stat-value" style="color:${remColor}">${Math.abs(remaining).toLocaleString()}</div>
            <div class="stat-unit">kcal</div>
          </div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab-btn ${state.activeTab === 'meals' ? 'active' : ''}" onclick="switchTab('meals')">Meals</button>
        <button class="tab-btn ${state.activeTab === 'today' ? 'active' : ''}" onclick="switchTab('today')">Today</button>
        <button class="tab-btn ${state.activeTab === 'weight' ? 'active' : ''}" onclick="switchTab('weight')">Weight</button>
      </div>
    </div>

    <!-- TODAY TAB -->
    ${state.activeTab === 'today' ? `
    <div class="content fade-in">
      <div class="fast-card" id="fastCard"></div>

      <div class="water-card">
        <div class="water-top">
          <span class="water-title">💧 Water</span>
          <span class="water-amount" id="waterAmount">${wL}L / ${goalL}L</span>
        </div>
        <div class="water-bar-bg">
          <div class="water-bar" id="waterBar" style="width:${wPct}%"></div>
        </div>
        <div class="water-chips">
          <button class="water-chip" onclick="addWater(550)">+550ml</button>
        </div>
        <div id="waterMsg">${w >= WATER_GOAL_ML
          ? '<span class="water-complete">✓ Goal reached!</span>'
          : '<button class="water-undo" onclick="undoWater()">↩ Undo last</button>'
        }</div>
      </div>

      <div class="card">
        <div class="card-label">Add food / drink</div>
        <div class="input-wrap">
          <input class="text-input" type="text" id="foodName" placeholder="Search quick-add or type food name…" value="${state.formName}" oninput="onSearch(this.value)" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
          <div id="autocompleteWrap"></div>
        </div>
        <div class="form-row">
          <input class="num-input" type="number" id="foodCal" placeholder="Calories (kcal)" value="${state.formCal}" oninput="state.formCal=this.value" />
          <select class="cat-select" id="foodCat" onchange="state.formCat=this.value">
            ${CATEGORIES.map(c => `<option value="${c}" ${state.formCat === c ? 'selected' : ''}>${c}</option>`).join('')}
          </select>
        </div>
        <button class="add-btn ${state.formName && state.formCal ? 'enabled' : 'disabled'}" onclick="submitForm()">Add to log</button>
      </div>

      <div class="quick-section">
        <div class="quick-label">Quick add</div>
        <div class="quick-chips">
          ${QUICK_ADD.map(q => `
            <button class="chip" onclick="addEntry('${q.name.replace(/'/g,"\\'")}',${q.cal},'${q.category.replace(/'/g,"\\'")}')">
              ${q.name} <span class="chip-cal">·${q.cal}</span>
            </button>
          `).join('')}
        </div>
      </div>

      ${entries.length === 0 ? `
        <div class="empty-state">Nothing logged yet today.<br>Add an item above or use a quick-add chip.</div>
      ` : `
        ${CATEGORIES.map(cat => {
          const items = grouped[cat];
          if (!items.length) return '';
          const catTotal = items.reduce((s, e) => s + e.cal, 0);
          return `
            <div style="margin-bottom:14px">
              <div class="cat-header">
                <span class="cat-name">${cat}</span>
                <span class="cat-total">${catTotal} kcal</span>
              </div>
              ${items.map(e => `
                <div class="entry-card">
                  <div>
                    <div class="entry-name">${e.name}</div>
                    <div class="entry-time">${formatTime(e.ts)}</div>
                  </div>
                  <div class="entry-right">
                    <span class="entry-cal">${e.cal}</span>
                    <button class="remove-btn" onclick="removeEntry(${e.id})">✕</button>
                  </div>
                </div>
              `).join('')}
            </div>
          `;
        }).join('')}
      `}
    </div>
    ` : ''}

    <!-- WEIGHT TAB -->
    ${state.activeTab === 'weight' ? `
    <div class="content fade-in">

      <!-- Progress summary -->
      <div class="weight-progress-section">
        <div class="weight-progress-row">
          <div class="weight-progress-stat">
            <div class="weight-progress-val" style="color:#f8fafc">${START_WEIGHT}</div>
            <div class="weight-progress-lbl">Start (kg)</div>
          </div>
          <div class="weight-progress-stat">
            <div class="weight-progress-val" style="color:${totalLost > 0 ? '#22c55e' : '#64748b'}">-${totalLost.toFixed(1)}</div>
            <div class="weight-progress-lbl">Lost (kg)</div>
          </div>
          <div class="weight-progress-stat">
            <div class="weight-progress-val" style="color:#f59e0b">${toGo > 0 ? toGo.toFixed(1) : '0'}</div>
            <div class="weight-progress-lbl">To go (kg)</div>
          </div>
          <div class="weight-progress-stat">
            <div class="weight-progress-val" style="color:#a78bfa">${TARGET_WEIGHT}</div>
            <div class="weight-progress-lbl">Target (kg)</div>
          </div>
        </div>
        <div class="wt-bar-bg">
          <div class="wt-bar" style="width:${progressPct}%"></div>
        </div>
        ${progressPct >= 100 ? `<div style="text-align:center;color:#22c55e;font-size:12px;margin-top:8px;font-weight:600">🎉 Target reached!</div>` : ''}
      </div>

      <!-- Log weight -->
      <div class="card">
        <div class="card-label">Log today's weight</div>
        <div class="weight-controls">
          <button class="weight-btn weight-btn-minus" onclick="adjustWeight(-0.1)">−</button>
          <div class="weight-display" id="weightDisplay">${state.weightInput.toFixed(1)}<span> kg</span></div>
          <button class="weight-btn weight-btn-plus" onclick="adjustWeight(0.1)">+</button>
        </div>
        <button class="weight-log-btn" onclick="logWeight()">Save weight</button>
      </div>

      <!-- Chart -->
      ${wLog.length >= 2 ? `
        <div class="card" style="padding-bottom:8px">
          <div class="card-label">Trend</div>
          ${buildWeightChart(wLog)}
          <div style="display:flex;justify-content:space-between;font-size:10px;color:#475569;margin-top:-4px">
            <span>${formatDate(wLog[0].date)}</span>
            <span style="color:#a78bfa;font-size:10px">— — target: ${TARGET_WEIGHT}kg</span>
            <span>${formatDate(wLog[wLog.length-1].date)}</span>
          </div>
        </div>
      ` : ''}

      <!-- Log history -->
      ${wLog.length > 0 ? `
        <div class="weight-history-label">Log</div>
        ${[...wLog].reverse().map((e, i, arr) => {
          const prev = arr[i + 1];
          const delta = prev ? Math.round((e.kg - prev.kg) * 10) / 10 : null;
          const deltaColor = delta === null ? '' : delta < 0 ? '#22c55e' : delta > 0 ? '#ef4444' : '#64748b';
          const deltaStr = delta === null ? '' : (delta > 0 ? '+' : '') + delta.toFixed(1) + ' kg';
          return `
            <div class="weight-entry">
              <span class="weight-entry-date">${formatDate(e.date)}</span>
              <div class="weight-entry-right">
                ${delta !== null ? `<span class="weight-entry-delta" style="color:${deltaColor}">${deltaStr}</span>` : ''}
                <span class="weight-entry-kg">${e.kg.toFixed(1)} kg</span>
                <button class="remove-btn" onclick="deleteWeight('${e.date}')">✕</button>
              </div>
            </div>
          `;
        }).join('')}
      ` : `
        <div class="empty-state">No weight logged yet.<br>Use the controls above to log your first entry.</div>
      `}
    </div>
    ` : ''}

    <!-- MEALS TAB -->
    ${state.activeTab === 'meals' ? `
    <div class="content fade-in">
      <div class="sync-line">
        <span class="sync-text ${state.mealsSyncCls}">${state.mealsSync}</span>
        <button class="refresh-link" onclick="loadMeals()">Refresh</button>
      </div>

      <div class="card-label">Core rotation</div>
      ${(() => {
        const core = state.meals.filter(m => m.type === 'Core rotation');
        if (core.length === 0) {
          return `
            <div class="seed-card">
              <div class="seed-names">Not synced yet: ${CORE_SEED.join(', ')}</div>
              <button class="add-btn enabled" id="seedBtn" onclick="seedCoreMeals()">Add these to the Sheet</button>
            </div>`;
        }
        const sorted = [...core].sort((a, b) => (mealDaysSince(b.lastHad) ?? 9999) - (mealDaysSince(a.lastHad) ?? 9999));
        return sorted.map(m => {
          const days = mealDaysSince(m.lastHad);
          return `
            <div class="meal-row">
              <div class="meal-dial" style="background:${mealDialColor(days)}">${mealDialLabel(days)}</div>
              <div class="meal-info">
                <div class="meal-name">${m.name}</div>
                <div class="meal-meta">${m.timesHad} time${m.timesHad === 1 ? '' : 's'} logged</div>
              </div>
              <button class="meal-had-btn" onclick="logMealToSheet('${m.name.replace(/'/g,"\\'")}','Core rotation', this)">Had it today</button>
            </div>`;
        }).join('');
      })()}

      <div style="margin-top:20px" class="card-label">Other meals</div>
      <div class="input-wrap" style="display:flex; gap:8px;">
        <input class="text-input" type="text" id="newMealInput" placeholder="Meal name" style="margin-bottom:0" />
        <button class="add-btn enabled" style="width:auto; padding:0 16px;" onclick="addOtherMeal()">Add</button>
      </div>

      ${(() => {
        const others = state.meals.filter(m => m.type !== 'Core rotation');
        if (others.length === 0) return `<div class="empty-state">Nothing logged here yet.</div>`;
        const sorted = [...others].sort((a, b) => (mealDaysSince(b.lastHad) ?? 9999) - (mealDaysSince(a.lastHad) ?? 9999));
        return sorted.map(m => {
          const days = mealDaysSince(m.lastHad);
          return `
            <div class="meal-row">
              <div class="meal-dial" style="background:${mealDialColor(days)}">${mealDialLabel(days)}</div>
              <div class="meal-info">
                <div class="meal-name">${m.name}</div>
                <div class="meal-meta">${m.timesHad} time${m.timesHad === 1 ? '' : 's'} logged</div>
              </div>
              <button class="meal-had-btn" onclick="logMealToSheet('${m.name.replace(/'/g,"\\'")}','Inspiration', this)">Had it today</button>
            </div>`;
        }).join('');
      })()}
    </div>
    ` : ''}
  `;
}

function switchTab(tab) { state.activeTab = tab; render(); renderFast(); if (tab === 'meals' && state.meals.length === 0) loadMeals(); }
function openGoalEdit() { state.editGoal = true; render(); document.getElementById("goalInput")?.focus(); }
function setGoal() {
  const v = parseInt(document.getElementById("goalInput")?.value);
  if (!isNaN(v) && v > 0) { state.goal = v; state.goalInput = v; localStorage.setItem("cal_goal", v); }
  state.editGoal = false; render();
}
function onSearch(val) {
  state.searchText = val; state.formName = val;
  const filtered = val.length > 1 ? QUICK_ADD.filter(q => q.name.toLowerCase().includes(val.toLowerCase())) : [];
  const wrap = document.getElementById("autocompleteWrap");
  if (wrap) {
    wrap.innerHTML = filtered.length ? `<div class="autocomplete">${filtered.map(q => `<div class="autocomplete-item" onclick="selectQuick('${q.name.replace(/'/g,"\\'")}',${q.cal},'${q.category.replace(/'/g,"\\'")}')"><span>${q.name}</span><span class="ac-cal">${q.cal} kcal</span></div>`).join('')}</div>` : '';
  }
}
function selectQuick(name, cal, cat) {
  state.formName = name; state.formCal = cal; state.formCat = cat; state.searchText = "";
  const nameEl = document.getElementById("foodName");
  const calEl = document.getElementById("foodCal");
  const catEl = document.getElementById("foodCat");
  if (nameEl) nameEl.value = name;
  if (calEl) calEl.value = cal;
  if (catEl) catEl.value = cat;
  const wrap = document.getElementById("autocompleteWrap");
  if (wrap) wrap.innerHTML = "";
}
function submitForm() {
  const name = document.getElementById("foodName")?.value || state.formName;
  const cal = document.getElementById("foodCal")?.value || state.formCal;
  const cat = document.getElementById("foodCat")?.value || state.formCat;
  state.formName = name; state.formCal = cal; state.formCat = cat;
  addEntry(name, parseFloat(cal), cat);
}

loadState();
render();
renderFast();
if (state.activeTab === 'meals') loadMeals();
</script>
</body>
</html>
