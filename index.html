<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Meal Planner" />
  <title>Charlesworth's Meal Planner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; max-width: 480px; margin: 0 auto; padding-bottom: 80px; }
    input, select, button { font-family: inherit; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.25s ease; }

    .header { background: #1e293b; padding: calc(24px + env(safe-area-inset-top)) 20px 20px; border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 100; text-align: center; }
    .page-title { font-size: 28px; font-weight: 800; color: #f8fafc; letter-spacing: -0.02em; line-height: 1.15; }

    .content { padding: 16px; text-align: center; }
    .card-label { font-size: 12px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }

    .input-wrap { position: relative; margin-bottom: 10px; }
    .text-input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #f8fafc; font-size: 14px; outline: none; }
    .text-input:focus { border-color: #3b82f6; }
    .add-btn { padding: 12px; border-radius: 8px; border: none; font-weight: 700; font-size: 14px; cursor: pointer; transition: transform 0.1s ease, box-shadow 0.15s ease, background 0.15s ease; }
    .add-btn.enabled { background: #3b82f6; color: #fff; box-shadow: 0 4px 14px rgba(59,130,246,0.4); }
    .add-btn.enabled:active { background: #2563eb; transform: scale(0.98); box-shadow: 0 2px 6px rgba(59,130,246,0.3); }

    .empty-state { text-align: center; padding: 40px 20px; color: #475569; font-size: 14px; line-height: 1.6; }

    .sync-line { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 14px; }
    .sync-text { font-size: 11px; color: #64748b; }
    .sync-text.ok { color: #22c55e; }
    .sync-text.err { color: #ef4444; }
    .refresh-link { background: transparent; border: none; color: #64748b; cursor: pointer; font-size: 11px; text-decoration: underline; }

    .meal-row { background: #1e293b; border-radius: 10px; padding: 10px 12px; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
    .meal-dial { width: 40px; height: 26px; border-radius: 13px; flex: 0 0 auto; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #0f172a; }
    .meal-info { flex: 1; min-width: 0; text-align: left; }
    .meal-name { font-size: 14px; font-weight: 500; color: #f1f5f9; }
    .meal-meta { font-size: 11px; color: #64748b; margin-top: 1px; }
    .meal-had-btn { background: #334155; color: #a78bfa; border: none; padding: 7px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; cursor: pointer; flex: 0 0 auto; }
    .meal-had-btn:disabled { opacity: 0.5; }
    .meal-row-wrap { margin-bottom: 6px; }
    .meal-row-actions { display: flex; gap: 6px; flex: 0 0 auto; }
    .assign-btn { background: #0f172a; color: #64748b; border: 1px solid #334155; padding: 7px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; cursor: pointer; }
    .assign-btn.active { background: #a78bfa; color: #0f172a; border-color: #a78bfa; }
    .day-picker { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; padding: 8px 4px 2px; }
    .day-chip { background: #0f172a; color: #a78bfa; border: 1px solid #334155; padding: 5px 9px; border-radius: 7px; font-size: 11px; font-weight: 600; cursor: pointer; }
    .day-chip:active { background: #334155; }

    .cat-chips { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 8px; }
    .cat-chip { padding: 6px 12px; border-radius: 20px; border: 1px solid #334155; background: #1e293b; color: #94a3b8; cursor: pointer; font-size: 12px; white-space: nowrap; }
    .cat-chip.active { background: #a78bfa; border-color: #a78bfa; color: #0f172a; font-weight: 600; }
    .cat-chip:active { background: #334155; }
    .cat-toggle-link { background: none; border: none; color: #64748b; font-size: 12px; text-decoration: underline; cursor: pointer; padding: 6px 0 0; display: block; text-align: left; }

    .week-card { background: #1e293b; border-radius: 14px; padding: 14px 16px; margin-bottom: 18px; }
    .week-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .week-clear-btn { background: transparent; border: none; color: #64748b; font-size: 11px; text-decoration: underline; cursor: pointer; }
    .week-day-row { display: flex; align-items: center; padding: 7px 0; border-bottom: 1px solid #0f172a; }
    .week-day-row:last-child { border-bottom: none; }
    .week-day-name { width: 40px; flex: 0 0 auto; font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
    .week-day-meal { flex: 1; font-size: 13px; color: #f1f5f9; text-align: left; }
    .week-day-meal.empty { color: #475569; font-style: italic; }
    .week-day-clear { background: transparent; border: none; color: #475569; font-size: 15px; cursor: pointer; padding: 0 4px; }
  </style>
</head>
<body>
<div id="app"></div>
<script>
const WORKER_URL = "https://meal-planner-worker.georgecharlesworth5.workers.dev";
const DAYS_OF_WEEK = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const MEAL_CATEGORIES = ["Pasta", "Rice/Pulses", "Potato", "Noodles", "Veggie", "Fish", "Oven Bakes", "Slow Cooker", "Others"];

let state = {
  meals: [], mealsSync: "Connecting…", mealsSyncCls: "",
  weekPlan: {}, assigningName: null, categoryFilter: "All",
  newMealName: "", newMealCategories: [], showAddCats: false,
};

async function loadMeals() {
  state.mealsSync = "Syncing…"; state.mealsSyncCls = "";
  render();
  try {
    const res = await fetch(`${WORKER_URL}/meals`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    state.meals = data.meals || [];
    state.mealsSync = "Synced with Sheet"; state.mealsSyncCls = "ok";
  } catch (err) {
    console.error("loadMeals failed", err);
    state.mealsSync = "Could not reach the Sheet"; state.mealsSyncCls = "err";
  }
  render();
}

async function loadWeekPlan() {
  try {
    const res = await fetch(`${WORKER_URL}/weekplan`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    state.weekPlan = data.weekPlan || {};
    state.mealsSync = "Synced with Sheet"; state.mealsSyncCls = "ok";
  } catch (err) {
    console.error("loadWeekPlan failed", err);
    state.mealsSync = "Could not reach the Sheet"; state.mealsSyncCls = "err";
  }
  render();
}

async function syncMealsTab() {
  await loadMeals();
  await loadWeekPlan();
}

function toggleAssign(name) {
  state.assigningName = state.assigningName === name ? null : name;
  render();
}

async function assignMealToDay(name, day) {
  state.weekPlan[day] = name; // optimistic update
  state.assigningName = null;
  render();
  try {
    const res = await fetch(`${WORKER_URL}/weekplan`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ day, meal: name })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
  } catch (err) {
    console.error("assignMealToDay failed", err);
    alert("Could not save to the Sheet: " + err.message);
  }
  await loadWeekPlan();
}

async function clearDaySlot(day) {
  delete state.weekPlan[day]; // optimistic update
  render();
  try {
    const res = await fetch(`${WORKER_URL}/weekplan`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ day, meal: "" })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
  } catch (err) {
    console.error("clearDaySlot failed", err);
    alert("Could not save to the Sheet: " + err.message);
  }
  await loadWeekPlan();
}

async function clearWeekPlan() {
  if (!confirm("Clear all meals assigned to this week?")) return;
  for (const day of DAYS_OF_WEEK) {
    try {
      await fetch(`${WORKER_URL}/weekplan`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ day, meal: "" })
      });
    } catch (err) {
      console.error("clearWeekPlan failed on", day, err);
    }
  }
  await loadWeekPlan();
}

function mealDaysSince(dateStr) {
  if (!dateStr) return null;
  const diff = (Date.now() - new Date(dateStr + "T00:00:00").getTime()) / 86400000;
  return Math.max(0, Math.floor(diff));
}
function mealDialColor(days) {
  if (days === null) return "#f59e0b";
  const t = Math.min(days, 21) / 21;
  const c1 = [71, 85, 105], c2 = [245, 158, 11]; // slate -> amber
  const r = Math.round(c1[0] + (c2[0]-c1[0]) * t);
  const g = Math.round(c1[1] + (c2[1]-c1[1]) * t);
  const b = Math.round(c1[2] + (c2[2]-c1[2]) * t);
  return `rgb(${r},${g},${b})`;
}
function mealDialLabel(days) {
  if (days === null) return "new";
  if (days === 0) return "today";
  return days + "d";
}

function categoryList(cat) {
  return (cat || "Others").split(",").map(s => s.trim()).filter(Boolean);
}

function mealRowHTML(m) {
  const days = mealDaysSince(m.lastHad);
  const escName = m.name.replace(/'/g, "\\'");
  const escCat = (m.category || "Others").replace(/'/g, "\\'");
  const isAssigning = state.assigningName === m.name;
  const picker = isAssigning ? `
    <div class="day-picker">
      ${DAYS_OF_WEEK.map(d => `<button class="day-chip" onclick="assignMealToDay('${escName}','${d}')">${d}</button>`).join('')}
    </div>` : '';
  return `
    <div class="meal-row-wrap">
      <div class="meal-row">
        <div class="meal-dial" style="background:${mealDialColor(days)}">${mealDialLabel(days)}</div>
        <div class="meal-info">
          <div class="meal-name">${m.name}</div>
          <div class="meal-meta">${categoryList(m.category).join(', ')} · ${m.timesHad} time${m.timesHad === 1 ? '' : 's'} logged</div>
        </div>
        <div class="meal-row-actions">
          <button class="assign-btn ${isAssigning ? 'active' : ''}" onclick="toggleAssign('${escName}')">Assign</button>
          <button class="meal-had-btn" onclick="logMealToSheet('${escName}','${escCat}', this)">Had it today</button>
        </div>
      </div>
      ${picker}
    </div>`;
}

async function logMealToSheet(name, category, btnEl, justAdd) {
  if (btnEl) { btnEl.disabled = true; btnEl.textContent = "Saving…"; }
  try {
    const res = await fetch(`${WORKER_URL}/log`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, category, justAdd: !!justAdd })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    await loadMeals();
  } catch (err) {
    console.error("logMeal failed", err);
    alert("Could not save to the Sheet: " + err.message);
    if (btnEl) { btnEl.disabled = false; btnEl.textContent = "Had it today"; }
  }
}

function addOtherMeal() {
  const name = state.newMealName.trim();
  const category = state.newMealCategories.length ? state.newMealCategories.join(", ") : "Others";
  if (!name) return;
  state.newMealName = "";
  state.newMealCategories = [];
  state.showAddCats = false;
  logMealToSheet(name, category, null, true);
}

function toggleAddCatsPicker() {
  state.showAddCats = !state.showAddCats;
  render();
}

function toggleNewMealCategory(cat) {
  const i = state.newMealCategories.indexOf(cat);
  if (i >= 0) state.newMealCategories.splice(i, 1);
  else state.newMealCategories.push(cat);
  render();
}

function setCategoryFilter(cat) {
  state.categoryFilter = cat;
  render();
}

function render() {
  const app = document.getElementById("app");

  app.innerHTML = `
    <div class="header">
      <div class="page-title">Charlesworth's Meal Planner</div>
    </div>

    <div class="content fade-in">
      <div class="sync-line">
        <span class="sync-text ${state.mealsSyncCls}">${state.mealsSync}</span>
        <button class="refresh-link" onclick="syncMealsTab();">Refresh</button>
      </div>

      <div class="week-card">
        <div class="week-header">
          <span class="card-label" style="margin-bottom:0">This week</span>
          <button class="week-clear-btn" onclick="clearWeekPlan()">Clear all</button>
        </div>
        ${DAYS_OF_WEEK.map(d => `
          <div class="week-day-row">
            <span class="week-day-name">${d}</span>
            <span class="week-day-meal ${state.weekPlan[d] ? '' : 'empty'}">${state.weekPlan[d] || 'Tap Assign on a meal below'}</span>
            ${state.weekPlan[d] ? `<button class="week-day-clear" onclick="clearDaySlot('${d}')">✕</button>` : ''}
          </div>
        `).join('')}
      </div>

      <div class="card-label" style="margin-top:4px">Filter by category</div>
      <div class="cat-chips">
        <button class="cat-chip ${state.categoryFilter === 'All' ? 'active' : ''}" onclick="setCategoryFilter('All')">All</button>
        ${MEAL_CATEGORIES.map(c => `<button class="cat-chip ${state.categoryFilter === c ? 'active' : ''}" onclick="setCategoryFilter('${c}')">${c}</button>`).join('')}
      </div>

      <div style="margin-top:16px" class="card-label">Add a meal</div>
      <div class="input-wrap" style="display:flex; gap:8px; justify-content:center;">
        <input class="text-input" type="text" id="newMealInput" placeholder="Meal name" style="margin-bottom:0" value="${state.newMealName}" oninput="state.newMealName=this.value" />
        <button class="add-btn enabled" style="width:auto; padding:0 16px;" onclick="addOtherMeal()">Add</button>
      </div>
      <button class="cat-toggle-link" onclick="toggleAddCatsPicker()">
        ${state.newMealCategories.length ? state.newMealCategories.join(', ') : (state.showAddCats ? 'Hide categories' : '+ Add categories (optional)')}
      </button>
      ${state.showAddCats ? `
        <div class="cat-chips" style="margin-top:8px;">
          ${MEAL_CATEGORIES.map(c => `<button class="cat-chip ${state.newMealCategories.includes(c) ? 'active' : ''}" onclick="toggleNewMealCategory('${c}')">${c}</button>`).join('')}
        </div>
      ` : ''}

      <div style="margin-top:16px" class="card-label">Meals</div>
      ${(() => {
        let meals = state.meals;
        if (state.categoryFilter !== 'All') meals = meals.filter(m => categoryList(m.category).includes(state.categoryFilter));
        if (meals.length === 0) return `<div class="empty-state">No meals in this category yet.</div>`;
        const sorted = [...meals].sort((a, b) => (mealDaysSince(b.lastHad) ?? 9999) - (mealDaysSince(a.lastHad) ?? 9999));
        return sorted.map(m => mealRowHTML(m)).join('');
      })()}
    </div>
  `;
}

render();
syncMealsTab();
</script>
</body>
</html>
